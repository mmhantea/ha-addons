name: Argon Neo 5 Monitor
version: "2.1.0"
slug: argon-neo5
description: CPU temperature monitor for Argon Neo 5 on Raspberry Pi 5
url: https://github.com/mmhantea/ha-addons/tree/main/argon-neo5
arch:
  - aarch64
startup: system
boot: auto
init: false
timeout: 30

map:
  - config:rw

options:
  update_interval: 30
  log_level: "info"

schema:
  update_interval: int(10,300)
  log_level: list(debug|info|warning|error)
